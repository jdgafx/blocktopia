<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Blocktopia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between; align-items: center;
    }
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
    #crosshair::after  { width: 20px; height: 2px; top: 9px; left: 0; }
    #hotbar {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; pointer-events: none;
    }
    .hotbar-slot {
      width: 44px; height: 44px; border: 2px solid #888;
      border-radius: 4px; background: rgba(0,0,0,0.5);
    }
    .hotbar-slot.active { border-color: #fff; }
    #block-name {
      position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px; text-shadow: 1px 1px 2px #000;
      pointer-events: none;
    }
    #info {
      position: fixed; top: 8px; left: 8px; color: #fff;
      font-size: 12px; text-shadow: 1px 1px 2px #000; pointer-events: none;
    }
    #click-to-play {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; pointer-events: all; cursor: pointer; z-index: 100;
    }
    #click-to-play h1 { font-size: 3rem; margin-bottom: 1rem; letter-spacing: 2px; }
    #click-to-play p  { font-size: 1.1rem; color: #aaa; }
    #touch-controls {
      display: none;
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
    }
    #joystick-zone {
      position: fixed; bottom: 80px; left: 20px;
      width: 120px; height: 120px;
      border-radius: 50%; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      pointer-events: all; touch-action: none;
    }
    #joystick-knob {
      position: absolute; width: 48px; height: 48px;
      border-radius: 50%; background: rgba(255,255,255,0.4);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .touch-btn {
      position: fixed; width: 56px; height: 56px;
      border-radius: 50%; background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; pointer-events: all; touch-action: none;
      user-select: none;
    }
    #btn-jump  { bottom: 100px; right: 90px; }
    #btn-break { bottom: 170px; right: 20px; }
    #btn-place { bottom: 100px; right: 20px; }
    #hint {
      position: fixed; top: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #ffe082; font-size: 14px;
      padding: 6px 14px; border-radius: 6px; pointer-events: none;
      display: none; max-width: 80vw; text-align: center;
    }
    #npc-dialog {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
      background: rgba(20,16,12,0.82); color: #fff; font-size: 15px;
      padding: 10px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25);
      pointer-events: none; display: none; max-width: min(520px, 86vw);
      text-align: center; line-height: 1.45;
    }
    #npc-dialog b { color: #ffcc66; }
    #auth-screen {
      position: fixed; inset: 0; z-index: 200;
      background: linear-gradient(#6db3e8, #a8d8a0);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff;
    }
    #auth-screen h1 { font-size: 3rem; letter-spacing: 3px; text-shadow: 2px 3px 0 rgba(0,0,0,0.35); }
    #auth-screen .tagline { margin: 6px 0 18px; color: #f4fff4; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
    .auth-card {
      background: rgba(0,0,0,0.55); padding: 22px; border-radius: 12px;
      display: flex; flex-direction: column; gap: 10px; width: min(320px, 88vw);
    }
    .auth-card input {
      padding: 10px 12px; border-radius: 6px; border: none; font-size: 15px;
    }
    .auth-card button {
      padding: 11px; border-radius: 6px; border: none; font-size: 15px;
      font-weight: bold; cursor: pointer; background: #4caf50; color: #fff;
    }
    .auth-card button:hover { filter: brightness(1.1); }
    .auth-row { display: flex; gap: 10px; }
    .auth-row button { flex: 1; }
    #btn-login { background: #1976d2; }
    .divider { text-align: center; color: #bbb; font-size: 12px; }
    #auth-error { color: #ff8a80; font-size: 13px; text-align: center; min-height: 1em; }
    #btn-logout {
      position: fixed; top: 8px; right: 8px; z-index: 50;
      padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer;
      background: rgba(0,0,0,0.5); color: #fff; font-size: 12px;
    }
    #inventory {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
    }
    #inventory-panel {
      background: rgba(28,24,20,0.95); border: 2px solid #666; border-radius: 12px;
      padding: 18px; max-width: min(560px, 92vw);
    }
    #inventory-panel h2 { color: #fff; font-size: 18px; margin-bottom: 4px; }
    #inventory-panel p { color: #aaa; font-size: 12px; margin-bottom: 12px; }
    #inventory-grid {
      display: grid; grid-template-columns: repeat(auto-fill, 48px); gap: 8px;
      justify-content: center;
    }
    .inv-cell {
      width: 48px; height: 48px; border: 2px solid #777; border-radius: 6px;
      cursor: pointer;
    }
    .inv-cell:hover { border-color: #fff; transform: scale(1.08); }
    #inventory-close {
      margin-top: 14px; width: 100%; padding: 9px; border: none; border-radius: 6px;
      background: #4caf50; color: #fff; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="click-to-play" style="display:none">
    <h1>BLOCKTOPIA</h1>
    <p>Click to play</p>
  </div>

  <div id="auth-screen">
    <h1>BLOCKTOPIA</h1>
    <p class="tagline">Free to play · Build together · <span id="online-count"></span></p>
    <div class="auth-card">
      <input id="auth-name" type="text" maxlength="20" placeholder="Your player name" autocomplete="nickname" title="The name other players see above your head" />
      <button id="btn-guest" title="Jump in instantly — no account needed">Play as Guest</button>
      <div class="divider">or with an account (saves your name everywhere)</div>
      <input id="auth-email" type="email" placeholder="Email" autocomplete="email" title="Used only to sign in — never shown to other players" />
      <input id="auth-password" type="password" placeholder="Password (6+ characters)" autocomplete="current-password" title="At least 6 characters" />
      <div class="auth-row">
        <button id="btn-login" title="Sign in to an existing account">Log In</button>
        <button id="btn-signup" title="Create a free account">Sign Up</button>
      </div>
      <div id="auth-error"></div>
    </div>
  </div>
  <button id="btn-logout" style="display:none" title="Sign out and return to the start screen">Log out</button>

  <div id="hud">
    <div id="info" title="Your position and framerate">WASD move · Space jump · Left click break · Right click place</div>
    <div id="crosshair"></div>
    <div>
      <div id="block-name"></div>
      <div id="hotbar" title="Your blocks — scroll the mouse wheel to choose"></div>
    </div>
  </div>
  <div id="hint"></div>
  <div id="npc-dialog"></div>

  <div id="touch-controls">
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div class="touch-btn" id="btn-jump" title="Jump">↑</div>
    <div class="touch-btn" id="btn-break" title="Break block">⛏</div>
    <div class="touch-btn" id="btn-place" title="Place block">🧱</div>
  </div>

  <div class="touch-btn" id="btn-bag" style="position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:50; pointer-events:all;" title="Open your block bag (or press E)">🎒</div>

  <div id="inventory">
    <div id="inventory-panel">
      <h2>Block Bag</h2>
      <p>Click a block to put it in your selected hotbar slot. Press E or Esc to close.</p>
      <div id="inventory-grid"></div>
      <button id="inventory-close" title="Back to the game">Done</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
